name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

env:
  IMAGE_NAME: dream-vacation-frontend

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 – Lint, test & build (React)
  # ─────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run dependency security audit
        working-directory: frontend
        run: npm audit --audit-level=high || true   # warn only

      # react-scripts ships ESLint – build catches lint errors too
      - name: Build React app (validates lint & compilation)
        working-directory: frontend
        env:
          # Prevent react-scripts from treating warnings as errors in CI
          CI: false
        run: npm run build

      # Run Jest unit tests (CI=true makes them non-interactive)
      - name: Run unit tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

  # ─────────────────────────────────────────────────────────
  # JOB 2 – Build & push Docker image
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only push on direct pushes (not PRs) to avoid leaking secrets
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # required for GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enable Docker layer caching for faster rebuilds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate with Docker Hub ──────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Derive image metadata & tags ─────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the short commit SHA on every push
            type=sha,prefix=sha-,format=short
            # Tag 'latest' only when pushing to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with branch name
            type=ref,event=branch

      # ── Build and push (multi-stage: builder → nginx) ─────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Image pushed with tags ${{ steps.meta.outputs.tags }}"
